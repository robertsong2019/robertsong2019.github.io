<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert's Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.9em;
            margin: 5px;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.7;
        }
        a {
            color: white;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Hello, World!</h1>
        <p>欢迎来到 Robert 的个人主页</p>
        
        <div class="badges">
            <span class="badge">🚀 OpenClaw User</span>
            <span class="badge">💻 Developer</span>
            <span class="badge">🌍 Based in China</span>
        </div>
        
        <div class="footer">
            <p>由 <a href="https://github.com/robertsong2019" target="_blank">@robertsong2019</a> 创建</p>
            <p>🤖 此页面由 OpenClaw AI Agent 自动生成</p>
            <p>创建时间: 2026-03-16</p>
        </div>
    </div>
</body>
</html>
