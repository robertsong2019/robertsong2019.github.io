        // Configuration
        const POSTS_PER_PAGE = 20;
        let currentPage = 1;
        
        // Group posts by month
        function groupByMonth(postList) {
            const groups = {};
            postList.forEach(post => {
                const month = post.date.substring(0, 7);
                if (!groups[month]) {
                    groups[month] = [];
                }
                groups[month].push(post);
            });
            
            const sortedMonths = Object.keys(groups).sort((a, b) => b.localeCompare(a));
            return sortedMonths.map(month => ({
                month,
                posts: groups[month]
            }));
        }
        
        // Format month
        function formatMonth(monthStr) {
            const [year, month] = monthStr.split('-');
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                               '七月', '八月', '九月', '十月', '十一月', '十二月'];
            return `${year}年 ${monthNames[parseInt(month) - 1]}`;
        }
        
        // Render posts
        function renderPosts() {
            const container = document.getElementById('postsContainer');
            const totalPosts = posts.length;
            const totalPages = Math.ceil(totalPosts / POSTS_PER_PAGE);
            
            // Get posts for current page
            const startIndex = (currentPage - 1) * POSTS_PER_PAGE;
            const endIndex = Math.min(startIndex + POSTS_PER_PAGE, totalPosts);
            const pagePosts = posts.slice(startIndex, endIndex);
            
            // Group by month
            const grouped = groupByMonth(pagePosts);
            
            // Render
            let html = '';
            grouped.forEach(group => {
                html += `
                    <section class="month-section">
                        <div class="month-header">
                            <h2 class="month-title">${formatMonth(group.month)}</h2>
                            <span class="month-badge">${group.posts.length} 篇</span>
                        </div>
                        <div class="posts-grid">
                            ${group.posts.map(post => `
                                <article class="post-card">
                                    <div class="post-meta">
                                        <span class="post-date">📅 ${post.date}</span>
                                    </div>
                                    <h3 class="post-title">
                                        <a href="${post.url}">${post.title}</a>
                                    </h3>
                                    <p class="post-excerpt">${post.excerpt}</p>
                                    <div class="post-tags">
                                        ${post.tags.map(tag => `<span class="post-tag">${tag}</span>`).join('')}
                                    </div>
                                    <a href="${post.url}" class="read-more">阅读全文 →</a>
                                </article>
                            `).join('')}
                        </div>
                    </section>
                `;
            });
            
            container.innerHTML = html;
            
            // Render pagination
            renderPagination(totalPages);
        }
        
        // Render pagination
        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.style.display = 'none';
                return;
            }
            
            pagination.style.display = 'flex';
            let html = '';
            
            // Previous button
            html += `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← 上一页</button>`;
            
            // Page numbers
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage < maxVisiblePages - 1) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            if (startPage > 1) {
                html += `<button onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    html += `<span class="pagination-ellipsis">...</span>`;
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    html += `<button class="active">${i}</button>`;
                } else {
                    html += `<button onclick="changePage(${i})">${i}</button>`;
                }
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    html += `<span class="pagination-ellipsis">...</span>`;
                }
                html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`;
            }
            
            // Next button
            html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页 →</button>`;
            
            pagination.innerHTML = html;
        }
        
        // Change page
        function changePage(page) {
            const totalPages = Math.ceil(posts.length / POSTS_PER_PAGE);
            if (page < 1 || page > totalPages) return;
            
            currentPage = page;
            renderPosts();
            
            // Smooth scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Update stats dynamically
        function updateStats() {
            // Total posts
            document.getElementById('totalPosts').textContent = posts.length;
            
            // Total months
            const months = new Set(posts.map(post => post.date.substring(0, 7)));
            document.getElementById('totalMonths').textContent = months.size;
            
            // Latest date
            const latestPost = posts.reduce((latest, post) => {
                return post.date > latest.date ? post : latest;
            });
            document.getElementById('latestDate').textContent = latestPost.date;
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
            renderPosts();
        });
    </script>
